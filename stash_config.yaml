name: chiyuchia proxy-rule for Stash
desc: >-
  基于 mihomo_config.yaml 迁移的 Stash override，按 stash.wiki 的配置结构保留
  proxy-groups、rule-providers 与 rules，并移除/改写 Mihomo 专属字段。

# Stash 更推荐把策略组与规则作为 override 叠加到托管配置/订阅上使用。
# 当前文件因此保留了分流逻辑，但不直接声明 proxies / proxy-providers。
# 如需完整独立配置，请在 Stash 中另外补充远程订阅或本地 proxies。

mode: rule
log-level: info

dns:
  # Stash 文档中的 DNS 主配置项：
  # https://stash.wiki/en/features/dns-server
  default-nameserver: #!replace
    - 119.29.29.29
    - 223.5.5.5
  nameserver: #!replace
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  skip-cert-verify: true
  follow-rule: false
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "+.334837632.xyz"
    - "+.07c06051-81fd-4aa4-a94e-a0860315df8f.org"
    - "+.cloud-nodes.com"
    - "+.nodesyo.org"
    - "+.link-t7.com"
    - "+.dexlos.com"
    - "+.us-nj.122870.xyz"
    - "+.sys.wpssx.com"
  nameserver-policy:
    "+.334837632.xyz": 119.29.29.29
    "+.07c06051-81fd-4aa4-a94e-a0860315df8f.org": 119.29.29.29
    "+.cloud-nodes.com": 140.205.1.13
    "+.nodesyo.org": 119.29.29.29
    "+.link-t7.com": 119.29.29.29
    "+.dexlos.com": 119.29.29.29
    "+.us-nj.122870.xyz": 119.29.29.29
    "+.sys.wpssx.com": 119.29.29.29

