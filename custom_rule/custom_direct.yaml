  - "DOMAIN-SUFFIX,07c06051-81fd-4aa4-a94e-a0860315df8f.org"
  - "DOMAIN-SUFFIX,22b74943-12ad-47f4-b705-f2defb6ffea0.org"
  - "DOMAIN-SUFFIX,oix_nodes.com"
  # 家宽上游节点域名；当前运行时通过“前置节点”接入，是否保留直连取决于你的链路设计
  - "DOMAIN,us-nj.122870.xyz"
