# 简化版 Mihomo 配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
find-process-mode: always
unified-delay: true
tcp-concurrent: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  use-hosts: true
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver-policy:
    "geosite:cn":
      - "https://doh.pub/dns-query"
      - "https://dns.alidns.com/dns-query"
  nameserver:
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "https://8.8.8.8/dns-query#🚀 节点选择"
  proxy-server-nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 443
    TLS:
      ports:
        - 443
  skip-domain:
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
  mtu: 1500

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    proxies:
      - "🏝️ 精品节点"
      - "🏠 家宽节点"
      - "💻 自建节点"
      - "🖥️ 合租节点"
      - "🇭🇰 香港节点"
      - "🇺🇲 美国节点"
      - "🇸🇬 狮城节点"
      - "🇲🇾 大马节点"
      - "🇯🇵 日本节点"
      - "🇼🇸 台湾节点"
      - "🌍 其他节点"

  - name: "🏠 家宽节点"
    type: select
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    filter: "(家宽|落地)"
    include-all: true

  - name: "🏝️ 精品节点"
