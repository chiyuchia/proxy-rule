    interval: 86400

  local-area-network: &classical_text_provider
    type: http
    behavior: classical
    format: text
    interval: 86400
    proxy: DIRECT
    path: ./ruleset/local-area-network.list
    url: "https://cdn.jsdmirror.com/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list"

